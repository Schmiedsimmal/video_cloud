version: "3"
services:
  video-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-cloud
    expose:
      - "3000"
    volumes:
      - /mnt/usb:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - video-cloud
    restart: always

volumes:
  caddy_data:
  caddy_config:
