version: "3"
services:
  video-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-cloud
    ports:
      - "3000:3000"
    volumes:
      - /mnt/ssd/video-cloud:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
    restart: always
